services:
  migrate:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m telepa3on.migrate

  app:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: uvicorn telepa3on.app:app --host 0.0.0.0 --port 8000

  poller:
    profiles: ["polling"]
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: python -m telepa3on.poller

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telepa3on
      POSTGRES_USER: telepa3on
      POSTGRES_PASSWORD: telepa3on
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telepa3on -d telepa3on"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
